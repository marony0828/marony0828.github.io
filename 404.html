<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acalog グループ招待</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #f5f5f7; color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) { body { background: #000; color: #f5f5f7; } }
    .card {
      max-width: 420px; margin: 24px; padding: 32px 24px; text-align: center;
      background: rgba(255,255,255,0.7); border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); backdrop-filter: blur(20px);
    }
    @media (prefers-color-scheme: dark) { .card { background: rgba(40,40,42,0.7); } }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.6; color: #6e6e73; margin: 8px 0; }
    @media (prefers-color-scheme: dark) { p { color: #a1a1a6; } }
    .btn {
      display: inline-block; margin-top: 20px; padding: 14px 28px;
      background: #0071e3; color: #fff; text-decoration: none;
      border-radius: 12px; font-size: 16px; font-weight: 600; border: none; cursor: pointer;
    }
    .hint { font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Acalog グループ招待</h1>
    <p>このリンクはバンドグループへの招待です。</p>
    <p>Acalog アプリをインストールしてログインした状態で、下のボタンを押してください。</p>
    <a class="btn" id="openApp" href="#">アプリで開く</a>
    <p class="hint">アプリが開かない場合は、Acalog を起動して<br>「招待コードで参加」に下のコードを貼り付けてください。</p>
    <p class="hint"><code id="code"></code></p>
  </div>
  <script>
    // /join/<token> から token を取り出し、custom scheme で起動を試みる
    var m = location.pathname.match(/\/join\/([^\/?#]+)/);
    var token = m ? m[1] : '';
    document.getElementById('code').textContent = token || '(コードを取得できませんでした)';
    var deep = 'harmonytracker://app/join/' + token;
    var btn = document.getElementById('openApp');
    btn.setAttribute('href', deep);
  </script>
</body>
</html>
