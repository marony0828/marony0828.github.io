<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acalog</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #f5f5f7; color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) { body { background: #000; color: #f5f5f7; } }
    .card { max-width: 420px; margin: 24px; padding: 32px; text-align: center; }
    h1 { font-size: 26px; }
    p { color: #6e6e73; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Acalog</h1>
    <p>チームの練習を記録するアプリ</p>
  </div>
</body>
</html>
